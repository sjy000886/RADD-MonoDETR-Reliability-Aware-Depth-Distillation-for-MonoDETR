random_seed: 444

# Lightweight MonoCoP adaptation. This keeps the RADD backbone, native DDN
# branch and CompletionFormer feature-affinity regularizer unchanged.
cop:
  enabled: True
  train_chain_prob: 0.5       # one hard route is sampled per query group
  uncertainty_tau: 0.0       # use CoP at inference when chain log-variance is lower
  size_residual_scale: 0.1
  selector_enabled: True
  freeze_base_epochs: 5      # with pretrain_model: train only new CoP modules first
  joint_lr_scale: 0.1        # decoder/legacy-head LR after the frozen stage

# Optional training-only depth feature regularization from CompletionFormer.
# CompletionFormer commonly stores KITTI depths as uint16 PNG (metres * 256).
teacher_depth:
  enabled: True
  root_dir: '/media/data/dataset/KITTIDataset/training/pseudo_depth_completionformer'
  filename_template: '{img_id:06d}.npy'  # also supports {split} and {index}
  value_scale: 1.0                      # these float32 arrays are already in metres
  confidence_root_dir: '/media/data/dataset/KITTIDataset/training/pseudo_confidence_completionformer'
  confidence_filename_template: '{img_id:06d}.npy'
  confidence_threshold: 0.0             # current confidence files are binary masks
  npz_key: 'depth'
  splits: ['train']                       # current folder covers ImageSets/train.txt
  missing_policy: 'error'               # 'error' or 'zeros'
  min_depth: 1e-3
  max_depth: 60.0
  augmentation_interpolation: 'masked_bilinear'
  target_interpolation: 'masked_bilinear' # downsample safely to the 1/16 feature grid
  loss_type: 'feature_affinity'          # training-only local geometry regularizer
  loss_coef: 0.1
  affinity_temperature: 0.1             # sensitivity to neighbouring log-depth changes
  smooth_l1_beta: 0.1
  feature_normalization_eps: 1e-6
  eps: 1e-6
  spatial_weighting:
    enabled: True
    background_weight: 0.1             # valid road/background pixels
    background_start_ratio: 0.45       # ignore sky outside object boxes
    box_edge_weight: 0.3                # outer 10% band of each 2D box
    box_interior_weight: 1.0
    box_center_weight: 1.5
    box_center_ratio: 0.5               # central 50% in width and height
    box_edge_ratio: 0.1
  # Native DDN remains enabled and is the only loss supervising depth logits.


dataset:
  type: &dataset_type 'KITTI'
  root_dir: '/media/data/dataset/KITTIDataset'
  train_split: 'train'
  test_split: 'val'
  batch_size: 10
  use_3d_center: True
  class_merging: False
  use_dontcare: False
  bbox2d_type: 'anno'  # 'proj' or 'anno'
  meanshape: False  # use predefined anchor or not
  writelist: ['Car']
  clip_2d: False

  aug_pd: True
  aug_crop: True

  random_flip: 0.5
  random_crop: 0.5
  scale: 0.05
  shift: 0.05

  depth_scale: 'normal'


model_name: 'radd_monodetr_cop'
model:
  num_classes: 3
  return_intermediate_dec: True
  device: 'cuda'

  # Backbone
  backbone: 'resnet50'
  train_backbone: True
  num_feature_levels: 4
  dilation: False
  position_embedding: 'sine'  # 'sine' or 'learned'
  masks: False

  # Depth predictor
  mode: LID
  num_depth_bins: 80
  depth_min: 1e-3
  depth_max: 60.0

  # Transformer
  with_box_refine: True
  two_stage: False
  use_dab: False
  use_dn: False
  two_stage_dino: False
  init_box: False
  enc_layers: 3
  dec_layers: 3
  hidden_dim: 256
  dim_feedforward: 256
  dropout: 0.1
  nheads: 8
  num_queries: 50
  group_num: 11
  enc_n_points: 4
  dec_n_points: 4
  # DN
  scalar: 5
  label_noise_scale: 0.2
  box_noise_scale: 0.4
  num_patterns: 0
  # Loss
  aux_loss: True

  # Loss coefficients
  cls_loss_coef: 2
  focal_alpha: 0.25

  bbox_loss_coef: 5
  giou_loss_coef: 2
  3dcenter_loss_coef: 10
  dim_loss_coef: 1
  angle_loss_coef: 1
  depth_loss_coef: 1
  depth_map_loss_coef: 1

  # Matcher
  set_cost_class: 2
  set_cost_bbox: 5
  set_cost_giou: 2
  set_cost_3dcenter: 10


optimizer:
  type: 'adamw'
  lr: 0.00015
  weight_decay: 0.0001


lr_scheduler:
  type: 'step'  # 'step' or 'cos'
  warmup: False  # 5 epoches, cosine warmup, init_lir=0.00001 in default
  decay_rate: 0.1
  decay_list: [35, 50]


trainer:
  max_epoch: 60
  gpu_ids: '1'
  save_frequency: 1  # checkpoint save interval (in epoch)
  # resume_model: True
  pretrain_model: 'outputs/monodetr_completionformer_feature_reg/checkpoint_best.pth'
  save_path: 'outputs/'
  save_all: False  # False for only savng the best and latest ckpts
  use_dn: False
  scalar: 5
  label_noise_scale: 0.2
  box_noise_scale: 0.4
  num_patterns: 0

tester:
  type: *dataset_type
  mode: single  # 'single' or 'all'; 'all' to evaluate all ckpts in the folder
  checkpoint: 195  # the start ckpt epoch for 'all'
  threshold: 0.2  # confidence filter
  topk: 50
